<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student CRUD App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Student Management System</h1>

    <!-- Form -->
    <div class="form">
      <input type="hidden" id="studentId">
      <input type="text" id="name" placeholder="Enter Name">
      <input type="number" id="age" placeholder="Enter Age">
      <input type="text" id="course" placeholder="Enter Course">

      
      <button type="button" onclick="saveStudent()">Save</button>
      <button onclick="clearForm()" class="cancel">Clear</button>
    </div>

    <!-- Table -->
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>Course</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
